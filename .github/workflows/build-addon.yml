# Build Petrol Price add-on and push to ghcr.io when a release is published.
# https://developers.home-assistant.io/docs/add-ons/repository
# Builder: https://github.com/home-assistant/builder
name: Build add-on

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set add-on image in config
        run: |
          sed -i "s|GITHUB_REPO_OWNER|${{ github.repository_owner }}|g" petrolprice/config.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on (amd64)
        uses: home-assistant/builder@2026.03.0
        with:
          args: |
            --amd64
            --target petrolprice
            --docker-hub ghcr.io/${{ github.repository_owner }}

      - name: Build and push add-on (aarch64)
        uses: home-assistant/builder@2026.03.0
        with:
          args: |
            --aarch64
            --target petrolprice
            --docker-hub ghcr.io/${{ github.repository_owner }}
